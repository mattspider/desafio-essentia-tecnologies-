<app-app-header [user]="user()" (logout)="logout()" />

<main class="app-main">
  <app-task-stats
    [total]="tasks.length"
    [pending]="pendingCount"
    [completed]="completedCount"
  />

  <div class="tasks-layout">
    <app-task-composer [creating]="creating" (create)="createTask($event)" />

    <app-task-board
      [tasks]="tasks"
      [loading]="loading"
      [pendingCount]="pendingCount"
      [completedCount]="completedCount"
      [editingTaskId]="editingTaskId"
      [editForm]="editForm"
      [metadataForms]="metadataForms"
      [priorities]="priorities"
      (refresh)="loadTasks()"
      (toggleCompleted)="toggleCompleted($event)"
      (edit)="startEdit($event)"
      (delete)="deleteTask($event)"
      (panelOpened)="onPanelOpened($event)"
      (saveEdit)="saveEdit($event)"
      (cancelEdit)="cancelEdit()"
      (saveMetadata)="saveMetadata($event)"
    />
  </div>
</main>
