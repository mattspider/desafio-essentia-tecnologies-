<app-app-header [user]="user()" (logout)="logout()" />

<main class="app-main">
  <app-task-stats
    [total]="facade.tasks().length"
    [pending]="facade.pendingCount()"
    [completed]="facade.completedCount()"
  />

  <div class="tasks-layout">
    <app-task-composer [creating]="facade.creating()" (create)="createTask($event)" />

    <app-task-board
      [tasks]="facade.tasks()"
      [loading]="facade.loading()"
      [pendingCount]="facade.pendingCount()"
      [completedCount]="facade.completedCount()"
      [editingTaskId]="facade.editingTaskId()"
      [editForm]="facade.editForm"
      [metadataForms]="facade.metadataForms"
      [priorities]="facade.priorities"
      (refresh)="facade.loadTasks()"
      (toggleCompleted)="toggleCompleted($event)"
      (edit)="startEdit($event)"
      (delete)="deleteTask($event)"
      (panelOpened)="onPanelOpened($event)"
      (saveEdit)="saveEdit($event)"
      (cancelEdit)="cancelEdit()"
      (saveMetadata)="saveMetadata($event)"
    />
  </div>
</main>
