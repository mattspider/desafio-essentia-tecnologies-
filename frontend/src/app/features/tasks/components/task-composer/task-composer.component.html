<aside class="composer">
  <mat-card class="composer-card">
    <mat-card-header>
      <mat-card-title>Nova tarefa</mat-card-title>
      <mat-card-subtitle>Adicione o que precisa fazer hoje</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" class="composer-form" (keydown.enter)="$event.preventDefault(); submit()">
        <mat-form-field appearance="outline">
          <mat-label>Título</mat-label>
          <input matInput formControlName="title" />
          <mat-hint>Ex.: Revisar documentação</mat-hint>
          @if (showValidationErrors && form.controls.title.invalid) {
            <mat-error>Título é obrigatório</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Descrição</mat-label>
          <textarea matInput rows="3" formControlName="description"></textarea>
          <mat-hint>Detalhes opcionais</mat-hint>
        </mat-form-field>

        <p class="composer-hint">
          Após criar, expanda a tarefa para definir <strong>prioridade</strong>, <strong>tags</strong> e
          <strong>notas</strong>.
        </p>

        <button mat-flat-button color="primary" type="button" (click)="submit()" [disabled]="creating()">
          @if (creating()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Adicionar tarefa
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</aside>
