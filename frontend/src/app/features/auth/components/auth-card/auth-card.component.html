<mat-card class="auth-card">
  <mat-card-content>
    <div class="auth-card__mobile-brand">
      <mat-icon>task_alt</mat-icon>
      TechX To-Do
    </div>

    <mat-card-header>
      <mat-card-title>{{ title() }}</mat-card-title>
      <mat-card-subtitle>{{ subtitle() }}</mat-card-subtitle>
    </mat-card-header>

    <ng-content />
  </mat-card-content>

  <mat-card-actions align="end" class="auth-card-actions">
    <span class="auth-footer-text">{{ footerText() }}</span>
    <a mat-button color="primary" [routerLink]="footerLink()">{{ footerLinkLabel() }}</a>
  </mat-card-actions>
</mat-card>
