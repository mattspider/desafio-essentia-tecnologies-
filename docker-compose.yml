services:
  mysql:
    image: mysql:8
    container_name: techx-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techx_todo
      MYSQL_USER: techx
      MYSQL_PASSWORD: techx123
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:7
    container_name: techx-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techx-backend
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: mysql://techx:techx123@mysql:3306/techx_todo
      MONGODB_URI: mongodb://mongo:27017/techx_todo
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  mysql_data:
  mongo_data:
