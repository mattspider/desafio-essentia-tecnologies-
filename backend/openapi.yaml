openapi: 3.0.3
info:
  title: TechX To-Do List API
  description: |
    API REST do TechX To-Do List — Desafio Essentia Technologies.

    ## Autenticação

    A API usa JWT em cookie **HttpOnly** (`techx_access_token`) com proteção **CSRF** (double-submit).

    ### Fluxo no Swagger UI ("Try it out")

    1. Execute `GET /auth/csrf` ou `POST /auth/login` / `POST /auth/register`
    2. Cookies de sessão são definidos automaticamente pelo browser
    3. Copie o `csrfToken` da resposta e use no header `X-CSRF-Token` nas mutações
    4. Alternativa para clientes API: header `Authorization: Bearer <token>` (sem CSRF)

    ### Rotas protegidas

    Mutações (`POST`, `PUT`, `PATCH`, `DELETE`) exigem CSRF quando usam cookies.
  version: 1.0.0
  contact:
    name: TechX To-Do List

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://desafio-essentia-tecnologies-production.up.railway.app/api
    description: Production (Railway)

tags:
  - name: Health
    description: Health check and service status
  - name: Auth
    description: Registration, login, session and CSRF
  - name: Tasks
    description: Task CRUD and status toggle
  - name: Metadata
    description: Task metadata (MongoDB) — tags, priority, notes, history

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns API status and database connectivity.
      operationId: getHealth
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Service unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/csrf:
    get:
      tags: [Auth]
      summary: Get CSRF token
      description: Issues a CSRF token (cookie + response body).
      operationId: getCsrf
      responses:
        '200':
          description: CSRF token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created and session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getMe
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      operationId: logout
      security:
        - cookieAuth: []
          csrfHeader: []
        - bearerAuth: []
      responses:
        '200':
          description: Session ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks:
    get:
      tags: [Tasks]
      summary: List user tasks
      operationId: listTasks
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Tasks]
      summary: Create a task
      operationId: createTask
      security:
        - cookieAuth: []
          csrfHeader: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/TaskId'

    get:
      tags: [Tasks]
      summary: Get task by ID
      operationId: getTaskById
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Tasks]
      summary: Update a task
      operationId: updateTask
      security:
        - cookieAuth: []
          csrfHeader: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Tasks]
      summary: Delete a task
      operationId: deleteTask
      security:
        - cookieAuth: []
          csrfHeader: []
        - bearerAuth: []
      responses:
        '204':
          description: Task deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}/toggle:
    parameters:
      - $ref: '#/components/parameters/TaskId'

    patch:
      tags: [Tasks]
      summary: Toggle task completed status
      operationId: toggleTask
      security:
        - cookieAuth: []
          csrfHeader: []
        - bearerAuth: []
      responses:
        '200':
          description: Task status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}/metadata:
    parameters:
      - $ref: '#/components/parameters/TaskId'

    get:
      tags: [Metadata]
      summary: Get task metadata
      operationId: getTaskMetadata
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Task metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskMetadata'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task or metadata not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Metadata]
      summary: Upsert task metadata
      operationId: upsertTaskMetadata
      security:
        - cookieAuth: []
          csrfHeader: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertMetadataRequest'
      responses:
        '200':
          description: Metadata saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskMetadata'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: techx_access_token
      description: JWT access token (HttpOnly cookie set on login/register)
    csrfHeader:
      type: apiKey
      in: header
      name: x-csrf-token
      description: CSRF token matching cookie techx_csrf_token (required for cookie-based mutations)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token fallback for API clients (no CSRF required)

  parameters:
    TaskId:
      name: id
      in: path
      required: true
      description: Task ID
      schema:
        type: integer
        minimum: 1
        example: 1

  schemas:
    User:
      type: object
      required: [id, email, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Jane Doe
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      required: [id, title, completed, userId, createdAt, updatedAt]
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Buy groceries
        description:
          type: string
          nullable: true
          example: Milk and bread
        completed:
          type: boolean
          example: false
        userId:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskPriority:
      type: string
      enum: [low, medium, high]
      example: medium

    TaskHistoryEntry:
      type: object
      required: [action, at]
      properties:
        action:
          type: string
          example: task_created
        at:
          type: string
          format: date-time

    TaskMetadata:
      type: object
      required: [taskId, userId, tags, priority, notes, history]
      properties:
        taskId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        tags:
          type: array
          items:
            type: string
          example: [work, urgent]
        priority:
          $ref: '#/components/schemas/TaskPriority'
        notes:
          type: string
          example: Follow up tomorrow
        history:
          type: array
          items:
            $ref: '#/components/schemas/TaskHistoryEntry'

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          minLength: 6
          format: password
          example: secret123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password
          example: secret123

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          example: New task
        description:
          type: string
          nullable: true
          example: Optional description

    UpdateTaskRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
          example: Updated title
        description:
          type: string
          nullable: true
        completed:
          type: boolean

    UpsertMetadataRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
          example: [work]
        priority:
          $ref: '#/components/schemas/TaskPriority'
        notes:
          type: string
          example: Some notes

    CsrfResponse:
      type: object
      required: [csrfToken]
      properties:
        csrfToken:
          type: string
          example: a1b2c3d4e5f6...

    SessionResponse:
      type: object
      required: [user, csrfToken]
      properties:
        user:
          $ref: '#/components/schemas/User'
        csrfToken:
          type: string

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'

    LogoutResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Logged out successfully

    HealthResponse:
      type: object
      required: [status, timestamp, services]
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            mysql:
              type: string
              example: connected
            mongo:
              type: string
              example: connected

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
              example: Task not found
            code:
              type: string
              example: NOT_FOUND
            details:
              type: array
              items:
                type: object
